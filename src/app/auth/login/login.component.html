<div class="login-container">
  <div class="login-card">
    <h2>🌾 Iniciar Sesión</h2>
    <p class="subtitle">Accede al marketplace agropecuario</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo Electrónico</mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="tu@email.com"
            autocomplete="email"
          >
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="isFieldInvalid('email')">
            {{ getFieldError('email') }}
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          >
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="isFieldInvalid('password')">
            {{ getFieldError('password') }}
          </mat-error>
        </mat-form-field>
      </div>

      <div class="error-message general-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="forgot-password-link">
        <a routerLink="/forgot-password" class="link">¿Olvidaste tu contraseña?</a>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading || loginForm.invalid"
      >
        <span *ngIf="loading">🔄 Iniciando sesión...</span>
        <span *ngIf="!loading">Iniciar Sesión</span>
      </button>
    </form>

    <div class="form-footer">
      <p>¿No tienes cuenta? 
        <a routerLink="/register" class="link">Regístrate aquí</a>
      </p>
    </div>
  </div>
</div>
